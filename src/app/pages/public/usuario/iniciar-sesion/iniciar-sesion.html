<div class="login-wrapper">

  <!-- LADO IZQUIERDO: imagen -->
  <div class="login-left">
    <!-- Reemplazá el src con tu imagen -->
    <img src="./img1.jpg" alt="Hospital San José" class="login-img">
    <div class="login-overlay">
      <div class="login-overlay-text">
        <p class="text-white fs-4">Más cerca de ti,</p>
        <h2 class="text-white fw-bold display-5">cuando más<br>nos necesitas</h2>
      </div>
    </div>
  </div>

  <!-- LADO DERECHO: formulario -->
  <div class="login-right">

    <!-- Logo -->
    <div class="mb-4">
      <img src="./logo_hospital.png" alt="Hospital San José" height="60"
           onerror="this.style.display='none'">
    </div>

    <h3 class="fw-bold mb-1">Iniciar sesión</h3>
    <p class="text-muted small mb-4">Ingresa tus datos para acceder al portal</p>

    <!-- Formulario -->
    <div class="mb-3">
      <label class="form-label small fw-semibold">Tipo de documento</label>
      <div class="d-flex gap-2">
        <select class="form-select" style="max-width: 110px;">
          <option>DNI</option>
          <option>CE</option>
          <option>Pasaporte</option>
        </select>
        <input type="text" class="form-control" placeholder="Nro de documento" maxlength="8">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-semibold">Contraseña</label>
      <div class="input-group">
        <input type="password" class="form-control" placeholder="Ingresa tu contraseña" id="inputPassword">
        <button class="btn btn-outline-secondary" type="button"
          onclick="
            const i = document.getElementById('inputPassword');
            const icon = this.querySelector('i');
            if(i.type === 'password') {
              i.type = 'text';
              icon.className = 'fa-regular fa-eye-slash';
            } else {
              i.type = 'password';
              icon.className = 'fa-regular fa-eye';
            }
          ">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="recordar">
        <label class="form-check-label small" for="recordar">Recordar documento</label>
      </div>
      <a href="#" class="small text-primary">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn btn-primary w-100 py-2 fw-semibold mb-3">
      Ingresar
    </button>

    <p class="text-center small text-muted">
      ¿No tienes cuenta?
      <a routerLink="/usuario/registrarme" class="text-primary fw-semibold">Registrarme</a>
    </p>

    <p class="text-center mt-4">
      <a routerLink="/" class="small text-muted">
        <i class="fa-solid fa-arrow-left me-1"></i>Volver al inicio
      </a>
    </p>

  </div>
</div>
