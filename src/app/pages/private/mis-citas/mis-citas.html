<!-- TOPBAR -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h5 class="fw-bold mb-0">Mis citas</h5>

  <div class="dropdown">
    <a href="#" class="btn btn-outline-secondary d-flex align-items-center gap-2"
       role="button" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="fa-regular fa-circle-user"></i>
      <span class="small fw-semibold">Mi cuenta</span>
    </a>
    <ul class="dropdown-menu dropdown-menu-end">
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/portal/mis-datos">
          <i class="fa-regular fa-user"></i> Mis datos
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" routerLink="/usuario/iniciar-sesion">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- TABS -->
<div class="bg-white border rounded-3 p-4">
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item">
      <a class="nav-link active" href="#" (click)="$event.preventDefault()">Próximas citas</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" (click)="$event.preventDefault()">Historial</a>
    </li>
  </ul>

  <!-- Sin citas -->
  <div class="text-center py-5 text-muted">
    <i class="fa-regular fa-calendar-xmark fa-3x mb-3"></i>
    <h6 class="fw-semibold">No tienes citas programadas</h6>
    <p class="small mb-4">Agenda tu próxima consulta médica de forma rápida y sencilla.</p>
    <a routerLink="/portal/agendar-cita" class="btn btn-primary px-4">
      Agendar cita
    </a>
  </div>

</div>
