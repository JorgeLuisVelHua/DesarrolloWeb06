<!-- TOPBAR -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h5 class="fw-bold mb-0">Documentos clínicos</h5>

  <div class="dropdown">
    <a href="#" class="btn btn-outline-secondary d-flex align-items-center gap-2"
       role="button" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="fa-regular fa-circle-user"></i>
      <span class="small fw-semibold">Mi cuenta</span>
    </a>
    <ul class="dropdown-menu dropdown-menu-end">
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/portal/mis-datos">
          <i class="fa-regular fa-user"></i> Mis datos
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" routerLink="/usuario/iniciar-sesion">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- TABS -->
<div class="bg-white border rounded-3 p-4">
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item">
      <a class="nav-link active" href="#" (click)="$event.preventDefault()">
        <i class="fa-solid fa-flask me-1"></i> Laboratorio
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" (click)="$event.preventDefault()">
        <i class="fa-solid fa-x-ray me-1"></i> Imágenes
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" (click)="$event.preventDefault()">
        <i class="fa-solid fa-file-prescription me-1"></i> Recetas
      </a>
    </li>
  </ul>

  <!-- Sin documentos -->
  <div class="text-center py-5 text-muted">
    <i class="fa-regular fa-folder-open fa-3x mb-3"></i>
    <h6 class="fw-semibold">No hay documentos disponibles</h6>
    <p class="small mb-0">Tus resultados y documentos clínicos aparecerán aquí una vez que estén disponibles.</p>
  </div>

</div>
