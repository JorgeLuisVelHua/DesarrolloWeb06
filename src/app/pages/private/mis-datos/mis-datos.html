<!-- TOPBAR -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h5 class="fw-bold mb-0">Mis datos</h5>

  <div class="dropdown">
    <a href="#" class="btn btn-outline-secondary d-flex align-items-center gap-2"
       role="button" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="fa-regular fa-circle-user"></i>
      <span class="small fw-semibold">Mi cuenta</span>
    </a>
    <ul class="dropdown-menu dropdown-menu-end">
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/portal/mis-datos">
          <i class="fa-regular fa-user"></i> Mis datos
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" routerLink="/usuario/iniciar-sesion">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- PERFIL -->
<div class="bg-white border rounded-3 p-4 mb-4">
  <div class="d-flex align-items-center gap-4 mb-4">
    <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center"
         style="width:72px;height:72px;">
      <i class="fa-regular fa-user fa-2x text-primary"></i>
    </div>
    <div>
      <h5 class="fw-bold mb-0">Nombre del Paciente</h5>
      <span class="text-muted small">Paciente registrado</span>
    </div>
  </div>

  <hr>

  <!-- Datos -->
  <div class="row g-4">

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Nombre completo</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-regular fa-user text-primary"></i>
        <span>Nombre del Paciente</span>
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Tipo y número de documento</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-regular fa-id-card text-primary"></i>
        <span>DNI · 12345678</span>
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Correo electrónico</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-regular fa-envelope text-primary"></i>
        <span>paciente@correo.com</span>
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Número de celular</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-solid fa-phone text-primary"></i>
        <span>+51 999 999 999</span>
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Fecha de nacimiento</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-regular fa-calendar text-primary"></i>
        <span>01/01/1990</span>
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label small text-muted fw-semibold">Dirección</label>
      <div class="d-flex align-items-center gap-2 bg-light rounded-3 p-3">
        <i class="fa-solid fa-location-dot text-primary"></i>
        <span>Callao, Perú</span>
      </div>
    </div>

  </div>

  <div class="d-flex justify-content-end mt-4">
    <button class="btn btn-primary d-flex align-items-center gap-2">
      <i class="fa-regular fa-pen-to-square"></i> Editar datos
    </button>
  </div>

</div>
